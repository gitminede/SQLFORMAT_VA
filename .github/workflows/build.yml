name: Build sqlformat_va.exe


on:
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependency
        run: python -m pip install --upgrade pip pyinstaller

      - name: Validate Python sources
        run: python -m py_compile app.py formatter.py

      - name: Build sqlformat_va.exe
        shell: pwsh
        run: pyinstaller --clean --noconfirm --onefile --name sqlformat_va --add-data "index.html;." --add-data "style.css;." --add-data "app.js;." app.py

      - name: Upload sqlformat_va.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqlformat_va.exe
          path: dist/sqlformat_va.exe
          if-no-files-found: error
