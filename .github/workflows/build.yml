name: Build SQL Formatter

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Python sources
        run: python -m py_compile app.py formatter.py

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp app.py formatter.py index.html app.js style.css README.md dist/
          if [ -f .gitignore ]; then cp .gitignore dist/; fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqlformatter-python-app
          path: dist/
