<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL Formattáló (Python)</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <h1>SQL Formattáló – Python backend</h1>
      <p>Bal oldalt nyers SQL, jobb oldalt formázott kimenet. Letöltés SQL artifactként.</p>
    </header>

    <main class="grid">
      <section>
        <label for="input">Bemenet</label>
        <textarea id="input" spellcheck="false"></textarea>
      </section>

      <section class="actions">
        <button id="format">Formázás ➜</button>
        <button id="download">Letöltés artifactként</button>
      </section>

      <section>
        <label for="output">Kimenet</label>
        <textarea id="output" spellcheck="false" readonly></textarea>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
